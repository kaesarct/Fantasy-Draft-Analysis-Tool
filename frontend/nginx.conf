server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10M;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy interno verso il backend FastAPI (raggiungibile solo nella rete Docker,
    # mai esposto direttamente sull'host).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Loghi squadra caricati sul backend (app.mount("/static/logos", ...)).
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # SPA Angular: qualsiasi altra route ricade su index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
