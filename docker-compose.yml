version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ft_user
      POSTGRES_PASSWORD: ft_password
      POSTGRES_DB: ft_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ft_user -d ft_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ft_user
      DB_PASSWORD: ft_password
      DB_NAME: ft_platform
      FANTA_USERNAME: ${FANTA_USERNAME:-}
      FANTA_PASSWORD: ${FANTA_PASSWORD:-}
      FANTA_YEAR_QUOTAZIONI: ${FANTA_YEAR_QUOTAZIONI:-24}
      FANTA_LEGA_NAME: ${FANTA_LEGA_NAME:-}
      FANTA_SESSION_FILE: /app/tamarros_session.json
      LOG_LEVEL: INFO
      CORS_ORIGINS: '["http://localhost:4200"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend/downloads:/app/downloads
      - ./backend/uploads:/app/uploads
      - ./backend/tamarros_session.json:/app/tamarros_session.json
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Angular Frontend (dev) ──────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --port 4200"
    environment:
      - NODE_ENV=development
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata: